# FlowDesk — full local stack. `docker compose up --build` is all a reviewer needs.
# Sensible defaults are inlined so it runs without a .env file; override via an
# env file (see .env.example) or `--env-file .env.<environment>`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowdesk}
      POSTGRES_DB: ${POSTGRES_DB:-flowdesk}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowdesk}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-flowdesk}:${POSTGRES_PASSWORD:-flowdesk}@postgres:5432/${POSTGRES_DB:-flowdesk}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      INVOICE_DUE_IN_DAYS: ${INVOICE_DUE_IN_DAYS:-30}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Node's global fetch — more reliable than busybox wget for this check.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: ./web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  postgres_data:
