# Production hardening overlay. Applied on top of the base compose:
#
#   docker compose --env-file .env.production \
#     -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Adds restart policies, log rotation and conservative resource limits. In a real
# deployment you would also stop publishing the Postgres/Redis ports to the host
# (keep them on the internal network only) and run behind a TLS-terminating proxy.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    restart: unless-stopped
    logging: *default-logging

  redis:
    restart: unless-stopped
    logging: *default-logging

  api:
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  web:
    restart: unless-stopped
    logging: *default-logging
